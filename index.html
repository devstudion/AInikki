<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>思い出捏造日記</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 style=%22dominant-baseline:central;text-anchor:middle;font-size:90px;%22>📖</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>思い出捏造日記</h1>
            <p>写真1枚から、AIが少しだけ盛った日記を作り出します</p>
        </header>

        <div id="screenCalendar">
            <div class="calendar-container">
                <div class="calendar-header">
                    <button id="prevMonth">◀</button>
                    <h2 id="calendarTitle"></h2>
                    <button id="nextMonth">▶</button>
                </div>
                <div class="calendar-weekdays">
                    <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
                </div>
                <div id="calendarDays" class="calendar-days"></div>
            </div>
            <p class="hint-text">👆 日付をタップして日記を開く</p>
        </div>

        <div id="screenEditor" style="display: none;">
            <button id="backBtn" class="back-btn">← カレンダーに戻る</button>

            <div class="selected-date-status">
                <span id="selectedDateText">未選択</span>
            </div>

            <div id="photoInputArea" class="input-group">
                <label for="imageInput" class="custom-file-upload">
                    📷 写真を選択して日記を盛る
                </label>
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
                
                <div id="previewContainer">
                    <img id="imagePreview" style="display:none; max-width: 100%; max-height: 300px; margin-top: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                </div>
            </div>

            <button id="generateBtn" class="primary-btn">日常を少し盛って日記にする</button>

            <div id="resultSection" class="result-section" style="display: none;">
                <p id="diaryOutput" style="line-height: 1.8;"></p>
                <button id="deleteBtn" class="delete-btn" style="display: none;">🗑️ この日の日記を消す</button>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
